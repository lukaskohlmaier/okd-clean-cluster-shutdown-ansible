---
# =============================================================================
# OKD Cluster Shutdown / Startup — Global Variables
# =============================================================================

# --- Cluster identity --------------------------------------------------------
cluster_name: "okd-prod"

# --- KUBECONFIG path on the management VM ------------------------------------
kubeconfig_path: "/home/ansible/.kube/config"

# --- oc CLI binary path ------------------------------------------------------
oc_binary: "/usr/local/bin/oc"

# --- etcd backup -------------------------------------------------------------
backup_dir: "/var/lib/etcd-backups"
backup_retention_count: 5

# --- Node drain settings -----------------------------------------------------
drain_timeout_seconds: 300
drain_grace_period_seconds: 30
drain_delete_emptydir_data: true
drain_skip_daemonsets: true
drain_force: true
# Pods matching these labels are not evicted during drain (optional).
# drain_pod_selectors: []

# --- VMware vSphere connection -----------------------------------------------
vcenter_hostname: "vcenter.example.com"
vcenter_username: "{{ vault_vcenter_username }}"
vcenter_password: "{{ vault_vcenter_password }}"
vcenter_datacenter: "DC1"
vcenter_validate_certs: false

# --- VM names as they appear in vSphere inventory ----------------------------
# Order matters: workers are shut down first; control planes last.
worker_vms:
  - "okd-worker-0"
  - "okd-worker-1"
  - "okd-worker-2"

control_plane_vms:
  - "okd-master-0"
  - "okd-master-1"
  - "okd-master-2"

# --- Delay / timing settings (seconds) --------------------------------------
delay_after_workers_shutdown: 30
delay_between_control_plane_shutdown: 15
delay_after_control_plane_power_on: 60
delay_after_workers_power_on: 30

# --- Startup health-check settings -------------------------------------------
api_health_retries: 30
api_health_delay: 20
node_ready_retries: 40
node_ready_delay: 15
cluster_operator_retries: 60
cluster_operator_delay: 20

# --- Logging -----------------------------------------------------------------
log_dir: "./logs"
